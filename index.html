<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Primer Trabajo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

    <header>
        <nav class="navbar bg-dark">
            <div class="container">
                <h1 class="text-white text-center w-100 fw-bold font-monospace">
                    Pagina de prueba
                </h1>
            </div>
        </nav>
    </header>

    <section class="bg-primary py-3">

        <div class="container">

            <div class="row text-center">

                <div class="col-12 col-md-4">
                    <p class="text-white fs-4 font-monospace">
                        Inicio
                    </p>
                </div>

                <div class="col-12 col-md-4">
                    <p class="text-white fs-4 font-monospace">
                        Productos
                    </p>
                </div>

                <div class="col-12 col-md-4">
                    <p class="text-white fs-4 font-monospace">
                        Registros
                    </p>
                </div>
            </div>
        </div>
    </section>

    <main>

        <div class="container mt-5">
            <div class="row g-4">
                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card shadow-lg rounded-4 h-100">
                        <div class="card-body text-center">
                            <h3 class="text-primary fw-bold font-monospace">
                                Caja 1
                            </h3>
                            <p>
                                Contenido de la caja 1
                            </p>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card shadow-lg rounded-4 h-100">
                        <div class="card-body text-center">
                            <h3 class="text-success fw-bold font-monospace">
                                Caja 2
                            </h3>
                            <p>
                                Contenido de la caja 2
                            </p>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card shadow-lg rounded-4 h-100">
                        <div class="card-body text-center">
                            <h3 class="text-danger fw-bold font-monospace">
                                Caja 3
                            </h3>
                            <p>
                                Contenido de la caja 3
                            </p>
                        </div>
                    </div>
                </div>

                <div class="col-12 col-md-6 col-lg-3">
                    <div class="card shadow-lg rounded-4 h-100">
                        <div class="card-body text-center">
                            <h3 class="text-warning fw-bold font-monospace">
                                Caja 4
                            </h3>
                            <p>
                                Contenido de la caja 4
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <footer class="bg-dark mt-5 py-3">

        <div class="container">
            <p class="text-center text-white m-0">
                Trabajo realizado con Bootstrap
            </p>
        </div>

    </footer>

</body>

</html>
