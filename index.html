<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Bootstrap Grid System</title>
</head>
<body>

    <!-- Header -->
    <div class="container-fluid bg-dark text-white text-center p-4">
        <h1>Diseño Responsive con Bootstrap</h1>
        <p>Uso de Grid System</p>
    </div>

    <!-- Contenido principal -->
    <div class="container mt-5">

        <div class="row">

            <!-- Columna 1 -->
            <div class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card p-3 shadow">
                    <h3>HTML</h3>
                    <p>
                        Lenguaje utilizado para estructurar páginas web.
                    </p>
                </div>
            </div>

            <!-- Columna 2 -->
            <div class="col-12 col-md-6 col-lg-4 mb-4">
                <div class="card p-3 shadow">
                    <h3>CSS</h3>
                    <p>
                        Permite dar estilos y diseño visual a la página.
                    </p>
                </div>
            </div>

            <!-- Columna 3 -->
            <div class="col-12 col-md-12 col-lg-4 mb-4">
                <div class="card p-3 shadow">
                    <h3>Bootstrap</h3>
                    <p>
                        Framework que facilita crear interfaces responsivas.
                    </p>
                </div>
            </div>

        </div>

    </div>

    <!-- Footer -->
    <div class="container-fluid bg-primary text-white text-center p-3 mt-5">
        <p>Actividad Bootstrap - Desarrollo Web</p>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
